# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - app-image-shk

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: crshk.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_697D253547E74946BF2ED5D6938DBFE1 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_436CA9616AA4423AB35A9B870A02C6B0 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: crshk.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_697D253547E74946BF2ED5D6938DBFE1 }}/guestbook:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-image-shk'
          slot-name: 'Production'
          images: 'crshk.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_697D253547E74946BF2ED5D6938DBFE1 }}/guestbook:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E690047D3F6C4EB48387B366A4870D9F }}